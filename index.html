<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/jpeg" href="/logo.jpeg" />
    <link rel="apple-touch-icon" href="/logo.jpeg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#9e3e66" />

    <title>Casa TK | Bronx Coffee &amp; Bakery</title>
    <meta
      name="description"
      content="Casa TK is a women-owned coffee shop and bakery in Soundview, Bronx serving fresh Mexican pan dulce, espresso drinks, and aguas frescas daily from 6am."
    />
    <link rel="canonical" href="https://casa-tk.vercel.app/" />

    <!-- Open Graph / social link previews. These are static because most
         link-preview crawlers (Facebook, iMessage, Slack, Discord) don't
         execute JavaScript, so per-route tags set from React never reach
         them — this is the version that actually gets used when the site
         is shared. -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Casa TK" />
    <meta property="og:title" content="Casa TK | Bronx Coffee &amp; Bakery" />
    <meta
      property="og:description"
      content="Fresh Mexican pan dulce, slow-brewed coffee, and breakfast comfort food in Soundview, Bronx — open daily from 6am."
    />
    <meta property="og:url" content="https://casa-tk.vercel.app/" />
    <meta property="og:image" content="https://casa-tk.vercel.app/gallery/bakery-case-2.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="900" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:locale:alternate" content="es_US" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Casa TK | Bronx Coffee &amp; Bakery" />
    <meta
      name="twitter:description"
      content="Fresh Mexican pan dulce, slow-brewed coffee, and breakfast comfort food in Soundview, Bronx — open daily from 6am."
    />
    <meta name="twitter:image" content="https://casa-tk.vercel.app/gallery/bakery-case-2.jpg" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Loaded non-blocking: media="print" makes the browser fetch it at
         low priority without holding up first paint, then the onload swap
         applies it to the real page. Fonts already use display=swap, so
         text never sits invisible waiting on this. -->
    <link
      href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link
        href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Inter:wght@400;500;600;700&display=swap"
        rel="stylesheet"
      />
    </noscript>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
